<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:'Outfit',sans-serif;color:#1C2721}
  .sheet{width:1080px;padding:46px 50px 60px;box-sizing:border-box}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:30px;margin:0 0 4px}
  .sub{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#67794C;margin:0 0 36px}
  .block{margin-bottom:40px}
  .lab{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin:0 0 12px}
  .row{display:flex;gap:18px;align-items:stretch;flex-wrap:wrap}
  .card{border-radius:14px;display:flex;align-items:center;justify-content:center;padding:30px;box-sizing:border-box}
  .cream{background:#FAF7F1;border:1px solid #E9E2D2;flex:1.4}
  .dark{background:#1C2721;flex:1.4}
  .white{background:#1F7F8C;flex:1}
  .mini{background:#FAF7F1;border:1px solid #E9E2D2;flex:.4;flex-direction:column;gap:10px}
  .mini span{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#8a8f83}
  .fr{font-family:'Fraunces',serif}.ou{font-family:'Outfit',sans-serif}
</style></head><body>
<div class="sheet">
  <h1>OZ Coaching — logo retenu&nbsp;: l'Œil + la vague</h1>
  <p class="sub">Concept 1 (l'œil, en blanc) · vague océan à la fin du nom · palette good vibes</p>

  <!-- PRINCIPAL -->
  <div class="block">
    <p class="lab">Logo principal</p>
    <div class="row">
      <div class="card cream">
        <!-- LOGO PRINCIPAL (fond clair) -->
        <svg width="430" height="150" viewBox="0 0 720 250" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(104,116)">
            <circle r="64" fill="none" stroke="#1C2721" stroke-width="5"/>
            <path d="M-42,0 Q0,-36 42,0 Q0,36 -42,0 Z" fill="#FFFFFF" stroke="#1C2721" stroke-width="4.2" stroke-linejoin="round"/>
            <circle r="16" fill="#1F7F8C"/>
            <circle r="6.6" fill="#1C2721"/>
            <circle cx="5.6" cy="-5.6" r="2.8" fill="#FFFFFF"/>
          </g>
          <text x="196" y="128" class="fr" font-size="66" font-weight="600" fill="#1C2721">Oz Coaching</text>
          <path d="M241,158 C 306,140 368,178 434,158 S 582,140 641,160" fill="none" stroke="#1F7F8C" stroke-width="13" stroke-linecap="round" opacity=".26"/>
          <path d="M241,158 C 306,140 368,178 434,158 S 582,140 641,160" fill="none" stroke="#1F7F8C" stroke-width="4.2" stroke-linecap="round"/>
          <text x="200" y="200" class="ou" font-size="16.5" letter-spacing="5.2" fill="#67794C">EMPLOI · CARRIÈRE · RECRUTEMENT</text>
        </svg>
      </div>
      <div class="card dark">
        <!-- LOGO (fond sombre) -->
        <svg width="430" height="150" viewBox="0 0 720 250" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(104,116)">
            <circle r="64" fill="none" stroke="#FAF7F1" stroke-width="5"/>
            <path d="M-42,0 Q0,-36 42,0 Q0,36 -42,0 Z" fill="#1C2721" stroke="#FAF7F1" stroke-width="4.2" stroke-linejoin="round"/>
            <circle r="16" fill="#3FA8B5"/>
            <circle r="6.6" fill="#FAF7F1"/>
          </g>
          <text x="196" y="128" class="fr" font-size="66" font-weight="600" fill="#FAF7F1">Oz Coaching</text>
          <path d="M241,158 C 306,140 368,178 434,158 S 582,140 641,160" fill="none" stroke="#3FA8B5" stroke-width="13" stroke-linecap="round" opacity=".35"/>
          <path d="M241,158 C 306,140 368,178 434,158 S 582,140 641,160" fill="none" stroke="#3FA8B5" stroke-width="4.2" stroke-linecap="round"/>
          <text x="200" y="200" class="ou" font-size="16.5" letter-spacing="5.2" fill="#A9C08F">EMPLOI · CARRIÈRE · RECRUTEMENT</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- OEIL EN BLANC -->
  <div class="block">
    <p class="lab">Version « œil en blanc » (monochrome, sur fond couleur)</p>
    <div class="row">
      <div class="card white">
        <svg width="430" height="150" viewBox="0 0 720 250" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(104,116)">
            <circle r="64" fill="none" stroke="#FFFFFF" stroke-width="5"/>
            <path d="M-42,0 Q0,-36 42,0 Q0,36 -42,0 Z" fill="none" stroke="#FFFFFF" stroke-width="4.2" stroke-linejoin="round"/>
            <circle r="15" fill="#FFFFFF"/>
          </g>
          <text x="196" y="128" class="fr" font-size="66" font-weight="600" fill="#FFFFFF">Oz Coaching</text>
          <path d="M241,158 C 306,140 368,178 434,158 S 582,140 641,160" fill="none" stroke="#FFFFFF" stroke-width="4.2" stroke-linecap="round" opacity=".9"/>
          <text x="200" y="200" class="ou" font-size="16.5" letter-spacing="5.2" fill="#FFFFFF" opacity=".85">EMPLOI · CARRIÈRE · RECRUTEMENT</text>
        </svg>
      </div>
      <div class="card mini">
        <svg width="82" height="82" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
          <circle cx="70" cy="70" r="64" fill="#1C2721"/>
          <path d="M28,70 Q70,34 112,70 Q70,106 28,70 Z" fill="#FAF7F1"/>
          <circle cx="70" cy="70" r="16.5" fill="#1F7F8C"/>
          <circle cx="70" cy="70" r="7" fill="#1C2721"/>
          <circle cx="76" cy="64" r="3" fill="#FAF7F1"/>
        </svg>
        <span>Avatar / favicon</span>
      </div>
    </div>
  </div>
</div>
</body></html>
