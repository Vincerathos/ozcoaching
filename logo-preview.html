<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:'Jost',sans-serif}
  .sheet{width:980px;padding:48px 48px 56px;box-sizing:border-box}
  .title{font-family:'Cormorant Garamond',serif;font-size:30px;color:#1F1B16;margin:0 0 4px}
  .sub{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#9A7B5E;margin:0 0 34px}
  .row{display:flex;gap:24px;margin-bottom:24px}
  .card{flex:1;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:38px;box-sizing:border-box}
  .cream{background:#FBF8F4;border:1px solid #ECE3D6}
  .white{background:#FFFFFF;border:1px solid #ECE3D6}
  .dark{background:#1F1B16}
  .sand{background:#EADBC9}
  .lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#857A6C;margin:0 0 10px}
  .serif{font-family:'Cormorant Garamond',Georgia,serif}.sans{font-family:'Jost',sans-serif}
  .small{width:240px;flex:none}
</style></head><body>
<div class="sheet">
  <p class="title">OZ Coaching — proposition de logo</p>
  <p class="sub">Direction artistique crème · taupe · encre</p>

  <p class="lbl">Logo principal</p>
  <div class="row">
    <div class="card cream">
      <svg width="440" height="196" viewBox="0 0 560 250">
        <rect x="170" y="86" width="220" height="36" fill="#D9BBA1"/>
        <text x="280" y="146" text-anchor="middle" class="serif" font-size="170" font-weight="600" fill="#1F1B16">Oz</text>
        <text x="272" y="192" text-anchor="middle" class="sans" font-size="26" font-weight="400" letter-spacing="15" fill="#1F1B16">COACHING</text>
        <text x="278" y="222" text-anchor="middle" class="sans" font-size="12.5" font-weight="300" letter-spacing="3.2" fill="#9A7B5E">AURÉLIA GRINO · COACH EMPLOI &amp; CARRIÈRE</text>
      </svg>
    </div>
    <div class="card dark">
      <svg width="440" height="196" viewBox="0 0 560 250">
        <rect x="170" y="86" width="220" height="36" fill="#D9BBA1"/>
        <text x="280" y="146" text-anchor="middle" class="serif" font-size="170" font-weight="600" fill="#FBF8F4">Oz</text>
        <text x="272" y="192" text-anchor="middle" class="sans" font-size="26" font-weight="400" letter-spacing="15" fill="#FBF8F4">COACHING</text>
        <text x="278" y="222" text-anchor="middle" class="sans" font-size="12.5" font-weight="300" letter-spacing="3.2" fill="#D9BBA1">AURÉLIA GRINO · COACH EMPLOI &amp; CARRIÈRE</text>
      </svg>
    </div>
  </div>

  <p class="lbl">Monogramme (avatar, favicon, réseaux)</p>
  <div class="row">
    <div class="card cream small">
      <svg width="130" height="130" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="94" fill="none" stroke="#1F1B16" stroke-width="2.5"/>
        <rect x="32" y="90" width="136" height="22" fill="#D9BBA1"/>
        <text x="100" y="132" text-anchor="middle" class="serif" font-size="110" font-weight="600" fill="#1F1B16">Oz</text>
      </svg>
    </div>
    <div class="card dark small">
      <svg width="130" height="130" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="94" fill="#D9BBA1"/>
        <rect x="0" y="90" width="200" height="22" fill="#1F1B16" opacity="0.0"/>
        <text x="100" y="132" text-anchor="middle" class="serif" font-size="110" font-weight="600" fill="#1F1B16">Oz</text>
      </svg>
    </div>
    <div class="card sand small">
      <svg width="130" height="130" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="94" fill="#1F1B16"/>
        <rect x="32" y="90" width="136" height="22" fill="#D9BBA1"/>
        <text x="100" y="132" text-anchor="middle" class="serif" font-size="110" font-weight="600" fill="#FBF8F4">Oz</text>
      </svg>
    </div>
  </div>
</div>
</body></html>
